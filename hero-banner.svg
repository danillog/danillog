<svg width="800" height="280" viewBox="0 0 800 280" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="core_grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ff9d" />
      <stop offset="50%" stop-color="#00d1ff" />
      <stop offset="100%" stop-color="#8a2be2" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glass">
      <feGaussianBlur stdDeviation="1" />
    </filter>
  </defs>

  <style>
    .bg { fill: #0D1117; }
    .grid { stroke: rgba(0, 255, 157, 0.05); stroke-width: 1; }
    .core-ring { stroke: url(#core_grad); stroke-width: 2; fill: none; filter: url(#glow); animation: rotate 20s linear infinite; }
    .core-hex { fill: rgba(138, 43, 226, 0.1); stroke: #8a2be2; stroke-width: 1; filter: url(#glow); }
    .stream { stroke: url(#core_grad); stroke-width: 1; fill: none; opacity: 0.3; stroke-dasharray: 100 300; animation: flow 5s linear infinite; }
    .node-text { font-family: 'SF Mono', monospace; fill: #00ff9d; font-size: 10px; opacity: 0.8; letter-spacing: 2px; }
    .main-title { font-family: 'Arial Black', sans-serif; fill: #fff; font-size: 28px; filter: url(#glow); }
    .sub-title { font-family: 'SF Mono', monospace; fill: #00d1ff; font-size: 12px; letter-spacing: 4px; }
    
    @keyframes rotate { from { transform: rotate(0deg); transform-origin: center; } to { transform: rotate(360deg); transform-origin: center; } }
    @keyframes flow { 0% { stroke-dashoffset: 400; } 100% { stroke-dashoffset: 0; } }
    @keyframes pulse { 0% { opacity: 0.4; } 100% { opacity: 1; } }
  </style>

  <rect width="800" height="280" class="bg" />
  
  <!-- Sub-Grid -->
  <g class="grid">
    <path d="M 0,40 L 800,40 M 0,80 L 800,80 M 0,120 L 800,120 M 0,160 L 800,160 M 0,200 L 800,200 M 0,240 L 800,240" />
    <path d="M 40,0 L 40,280 M 80,0 L 80,280 M 120,0 L 120,280 M 160,0 L 160,280 M 200,0 L 200,280 M 240,0 L 240,280 M 280,0 L 280,280 M 320,0 L 320,280 M 360,0 L 360,280 M 400,0 L 400,280 M 440,0 L 440,280 M 480,0 L 480,280 M 520,0 L 520,280 M 560,0 L 560,280 M 600,0 L 600,280 M 640,0 L 640,280 M 680,0 L 680,280 M 720,0 L 720,280 M 760,0 L 760,280" />
  </g>

  <!-- Flowing Data Streams -->
  <path d="M -50,140 Q 200,100 400,140 T 850,140" class="stream" style="animation-duration: 3s;" />
  <path d="M -50,160 Q 200,200 400,160 T 850,160" class="stream" style="animation-duration: 4s; opacity: 0.2;" />
  <path d="M -50,120 Q 200,60 400,120 T 850,120" class="stream" style="animation-duration: 6s; opacity: 0.1;" />

  <!-- Central Engine Core -->
  <g transform="translate(400, 140)">
    <circle r="70" class="core-ring" />
    <circle r="55" class="core-ring" style="animation-direction: reverse; opacity: 0.5;" />
    <path d="M 30,0 L 15,25 L -15,25 L -30,0 L -15,-25 L 15,-25 Z" class="core-hex" transform="scale(1.5)" />
    
    <text y="-90" class="node-text" text-anchor="middle" style="animation: pulse 2s infinite alternate;">SYSTEM_STABLE: 0x7F_WASM_CORE</text>
  </g>

  <!-- Title Overlays -->
  <text x="400" y="145" class="main-title" text-anchor="middle">DANILLO GOMES</text>
  <text x="400" y="170" class="sub-title" text-anchor="middle">R&amp;D SOFTWARE ENGINEER</text>

  <!-- Decorative Tech Elements -->
  <text x="650" y="60" class="node-text">MEM_ISO: 100%</text>
  <text x="650" y="80" class="node-text">THREADS: ACTIVE</text>
  <text x="100" y="220" class="node-text">V8_BRIDGE: CONNECTED</text>
  <text x="100" y="240" class="node-text">SIMD: ENABLED</text>

</svg>