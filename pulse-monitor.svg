<svg width="800" height="60" viewBox="0 0 800 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg { fill: #0D1117; }
    .grid { stroke: #1a1b26; stroke-width: 1; }
    .wave {
      stroke: #00ff9d;
      stroke-width: 2;
      fill: none;
      filter: drop-shadow(0 0 2px #00ff9d);
    }
    .text { font-family: monospace; fill: #555; font-size: 10px; }
    
    @keyframes move-wave {
      0% { transform: translateX(0); }
      100% { transform: translateX(-100px); }
    }
  </style>

  <rect width="800" height="60" class="bg" />
  
  <!-- Grid Lines -->
  <path d="M 0,15 L 800,15 M 0,30 L 800,30 M 0,45 L 800,45" class="grid" />
  <path d="M 50,0 L 50,60 M 150,0 L 150,60 M 250,0 L 250,60 M 350,0 L 350,60 M 450,0 L 450,60 M 550,0 L 550,60 M 650,0 L 650,60 M 750,0 L 750,60" class="grid" />

  <text x="10" y="12" class="text">LATENCY_MONITOR [STABLE]</text>
  <text x="720" y="12" class="text">0.004ms</text>

  <mask id="fade">
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="black" />
      <stop offset="0.1" stop-color="white" />
      <stop offset="0.9" stop-color="white" />
      <stop offset="1" stop-color="black" />
    </linearGradient>
    <rect width="800" height="60" fill="url(#grad)" />
  </mask>

  <g mask="url(#fade)">
    <path class="wave" d="M -100,30 L -80,30 L -75,10 L -70,50 L -65,30 L 0,30 L 20,30 L 25,10 L 30,50 L 35,30 L 100,30 L 120,30 L 125,10 L 130,50 L 135,30 L 200,30 L 220,30 L 225,10 L 230,50 L 235,30 L 300,30 L 320,30 L 325,10 L 330,50 L 335,30 L 400,30 L 420,30 L 425,10 L 430,50 L 435,30 L 500,30 L 520,30 L 525,10 L 530,50 L 535,30 L 600,30 L 620,30 L 625,10 L 630,50 L 635,30 L 700,30 L 720,30 L 725,10 L 730,50 L 735,30 L 800,30 L 820,30 L 825,10 L 830,50 L 835,30 L 900,30" style="animation: move-wave 2s linear infinite;" />
  </g>
</svg>