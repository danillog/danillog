<svg width="800" height="200" viewBox="0 0 800 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg { fill: #0D1117; }
    .box { fill: rgba(22, 27, 34, 0.8); stroke: #30363d; stroke-width: 1; }
    .box-prime { fill: rgba(0, 255, 157, 0.05); stroke: #00ff9d; stroke-width: 1.5; }
    .line { stroke: #30363d; stroke-width: 1; }
    .text-h { font-family: 'SF Mono', monospace; fill: #00ff9d; font-size: 11px; font-weight: bold; }
    .text-p { font-family: 'SF Mono', monospace; fill: #8b949e; font-size: 9px; }
    .dot { fill: #00ff9d; }
  </style>

  <rect width="800" height="200" class="bg" />

  <!-- Layout BluePrint Style -->
  <rect x="310" y="70" width="180" height="60" rx="4" class="box-prime" />
  <text x="400" y="95" class="text-h" text-anchor="middle">WASM / C++ CORE</text>
  <text x="400" y="110" class="text-p" text-anchor="middle">R&amp;D Innovation</text>

  <rect x="60" y="20" width="160" height="50" rx="4" class="box" />
  <text x="140" y="42" class="text-h" text-anchor="middle">FRONTEND ARCH</text>
  <text x="140" y="55" class="text-p" text-anchor="middle">React / Next.js</text>

  <rect x="60" y="130" width="160" height="50" rx="4" class="box" />
  <text x="140" y="152" class="text-h" text-anchor="middle">PERFORMANCE</text>
  <text x="140" y="165" class="text-p" text-anchor="middle">WebWorkers / SIMD</text>

  <rect x="580" y="20" width="160" height="50" rx="4" class="box" />
  <text x="660" y="42" class="text-h" text-anchor="middle">DEVOPS / QA</text>
  <text x="660" y="55" class="text-p" text-anchor="middle">Docker / CI / CD</text>

  <rect x="580" y="130" width="160" height="50" rx="4" class="box" />
  <text x="660" y="152" class="text-h" text-anchor="middle">CV / INTELLIGENCE</text>
  <text x="660" y="165" class="text-p" text-anchor="middle">ONNX / YOLO</text>

  <!-- Connectors -->
  <path d="M 220,45 L 310,100 M 220,155 L 310,100 M 490,100 L 580,45 M 490,100 L 580,155" class="line" />
  <circle cx="310" cy="100" r="2" class="dot" />
  <circle cx="490" cy="100" r="2" class="dot" />
</svg>